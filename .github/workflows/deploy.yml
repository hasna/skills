name: Deploy Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional production image tag override
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tool-skillsmd-web
  AWS_ROLE_ARN: arn:aws:iam::059898286899:role/tool-skillsmd-github-actions-production

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build package and dashboard
        run: |
          bun run build
          bun run dashboard:build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate production runtime secrets
        run: bash scripts/production_validate_runtime_secrets.sh

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image coordinates
        id: image-meta
        run: |
          image_repository="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          image_tag="${{ inputs.image_tag }}"
          if [[ -z "$image_tag" ]]; then
            image_tag="production-${GITHUB_REF_NAME#v}-${GITHUB_SHA::8}"
          fi
          {
            echo "image_repository=$image_repository"
            echo "image_tag=$image_tag"
            echo "image=$image_repository:$image_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://skills.md
          tags: ${{ steps.image-meta.outputs.image }}

      - name: Validate production Stripe secrets
        run: bash scripts/production_validate_secrets.sh

      - name: Register production task definition
        id: register-task
        run: bash scripts/production_deploy_ecs.sh
        env:
          PRODUCTION_IMAGE: ${{ steps.image-meta.outputs.image }}
          PRODUCTION_REGISTER_ONLY: "1"

      - name: Run migrations
        run: bash scripts/production_migrate.sh

      - name: Deploy production ECS service
        id: deploy
        run: bash scripts/production_deploy_ecs.sh
        env:
          PRODUCTION_IMAGE: ${{ steps.image-meta.outputs.image }}

      - name: Deploy production workers
        run: bash scripts/production_deploy_workers.sh
        env:
          PRODUCTION_IMAGE: ${{ steps.image-meta.outputs.image }}

      - name: Smoke test production
        run: bash scripts/production_smoke.sh
        env:
          PRODUCTION_URL: ${{ steps.deploy.outputs.production_url }}

      - name: Verify production readiness
        run: bash scripts/production_readiness.sh
