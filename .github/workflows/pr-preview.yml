name: PR Preview

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Numeric preview identifier for manual canary runs
        required: true
        default: "90001"
      preview_id:
        description: Preview host prefix for manual canary runs
        required: true
        default: canary
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tool-skillsmd-web
  PREVIEW_DOMAIN: preview.skills.md
  PR_NUMBER: ${{ github.event.number || inputs.pr_number }}
  PREVIEW_ID: ${{ inputs.preview_id || '' }}
  AWS_ROLE_ARN: arn:aws:iam::059898286899:role/tool-skillsmd-github-actions-preview

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'workflow_dispatch' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image coordinates
        id: image-meta
        run: |
          image_repository="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          image_tag="pr-${PR_NUMBER}-${GITHUB_SHA::8}"
          {
            echo "image_repository=$image_repository"
            echo "image_tag=$image_tag"
            echo "image=$image_repository:$image_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://pr-${{ env.PR_NUMBER }}.${{ env.PREVIEW_DOMAIN }}
          tags: ${{ steps.image-meta.outputs.image }}

      - name: Create preview database and runtime secret
        run: bash scripts/pr_preview_create_db.sh

      - name: Deploy preview ECS service
        id: deploy
        run: bash scripts/pr_preview_deploy_ecs.sh
        env:
          PREVIEW_IMAGE: ${{ steps.image-meta.outputs.image }}

      - name: Run migrations
        run: bash scripts/pr_preview_migrate.sh

      - name: Smoke test preview
        run: bash scripts/pr_preview_smoke.sh
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}

      - name: Optional AI preview test
        run: |
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "ANTHROPIC_API_KEY is not configured; skipping AI preview tests."
            exit 0
          fi
          bun install -g @hasna/testers
          testers run "${{ steps.deploy.outputs.preview_url }}" \
            --github-comment \
            --json \
            --output results.json \
            --timeout 300000
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.number }}

      - name: Upload AI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-test-results-pr-${{ github.event.number }}
          path: results.json
          if-no-files-found: ignore

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.sha.substring(0, 8);
            const body = [
              '### Preview Deployment',
              '',
              '| | |',
              '|---|---|',
              `| **URL** | ${url} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Branch** | \`${context.payload.pull_request.head.ref}\` |`,
              '',
              '_Smoke tests passed. AI preview tests run when `ANTHROPIC_API_KEY` is configured._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes('### Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    name: Cleanup Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup preview resources
        run: bash scripts/pr_preview_cleanup.sh

      - name: Comment cleanup notice
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes('### Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: '### Preview Deployment\n\n_Preview environment destroyed after PR close._',
              });
            }
